name: Development Branches CI

on:
  push:
    branches-ignore: [ "main" ]

jobs:
  lint-and-fix-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    
    steps:
      - uses: actions/checkout@v4
        with:
          # We need to fetch with write permission to push formatting fixes
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'
      
      - name: Update package-lock.json
        run: npm install --package-lock-only
      
      - name: Install dependencies
        run: npm install
      
      - name: Run linting and auto-fix
        run: npm run format
      
      - name: Run tests
        run: npm test
        
      - name: Commit formatting changes
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-format code with Prettier"
          git push

  lint-and-fix-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    
    steps:
      - uses: actions/checkout@v4
        with:
          # We need to fetch with write permission to push formatting fixes
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'
      
      - name: Update package-lock.json
        run: npm install --package-lock-only
      
      - name: Install dependencies
        run: npm install
      
      - name: Run linting and auto-fix
        run: npm run format
      
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db?schema=public"
          JWT_SECRET: "test-jwt-secret"
          NODE_ENV: "test"
          
      - name: Commit formatting changes
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-format code with Prettier"
          git push
